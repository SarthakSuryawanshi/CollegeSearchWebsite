<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Search - Cloud Counselage GPI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Find Your College</h1>
    <p>Search IT & Management colleges across India</p>
  </header>

  <main>
    <section class="search-panel">
      <input type="text" id="searchInput" placeholder="Search by college name...">
      <div class="filters">
        <input type="text" id="cityInput" placeholder="City">
        <select id="typeInput">
          <option value="">All Types</option>
          <option value="IT">IT</option>
          <option value="Management">Management</option>
          <option value="Both">Both</option>
        </select>
        <input type="text" id="courseInput" placeholder="Course (e.g. MBA, B.Tech)">
        <button id="clearBtn">Clear Filters</button>
      </div>
    </section>

    <section id="resultsCount"></section>

    <section id="results" class="results-grid">
      <!-- College cards injected here by script.js -->
    </section>
  </main>

  <footer>
    <p>Cloud Counselage GPI &mdash; College Search Website</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
